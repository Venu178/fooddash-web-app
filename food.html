<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash - Food Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#0a0a0a}
        ::-webkit-scrollbar-thumb{background:#262626;border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:#404040}
        @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        @keyframes pulse-dot{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        .animate-fade-in{animation:fadeIn .5s ease-out forwards}
        .animate-slide-right{animation:slideInRight .4s ease-out forwards}
        .animate-slide-up{animation:slideInUp .6s ease-out forwards}
        .animate-scale-in{animation:scaleIn .3s ease-out forwards}
        .stagger-1{animation-delay:.1s;opacity:0}
        .stagger-2{animation-delay:.2s;opacity:0}
        .stagger-3{animation-delay:.3s;opacity:0}
        .stagger-4{animation-delay:.4s;opacity:0}
        .stagger-5{animation-delay:.5s;opacity:0}
        .stagger-6{animation-delay:.6s;opacity:0}
        .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .line-clamp-1{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
        .glass{background:rgba(23,23,23,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
        .card-hover{transition:all .3s ease}
        .card-hover:hover{border-color:rgba(249,115,22,0.3);transform:translateY(-4px);box-shadow:0 20px 40px -12px rgba(0,0,0,0.5)}
        .img-hover{transition:transform .7s ease}
        .img-hover:hover{transform:scale(1.08)}
        .btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);transition:all .2s}
        .btn-primary:hover{background:linear-gradient(135deg,#fb923c,#f97316);transform:translateY(-1px);box-shadow:0 8px 24px -4px rgba(249,115,22,0.4)}
        .btn-primary:active{transform:scale(0.97)}
        .toast-enter{animation:slideInUp .3s ease-out forwards}
        .category-active{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border-color:transparent}
        .qty-btn{transition:all .15s}
        .qty-btn:hover{background:rgba(249,115,22,0.2)}
        .qty-btn:active{transform:scale(0.9)}
        input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(249,115,22,0.5);box-shadow:0 0 0 3px rgba(249,115,22,0.1)}
        .search-highlight{background:rgba(249,115,22,0.2);border-radius:2px;padding:0 2px}
        .overlay{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans min-h-screen">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2"></div>

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="#home" class="flex items-center gap-2 group">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/20">
                        <i data-lucide="flame" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Food<span class="text-brand-500">Dash</span></span>
                </a>

                <!-- Search Bar (Desktop) -->
                <div class="hidden md:flex flex-1 max-w-md mx-8">
                    <div class="relative w-full">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500"></i>
                        <input type="text" id="search-input" placeholder="Search restaurants or dishes..." 
                            class="w-full bg-neutral-900 border border-white/5 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-neutral-500 transition-all duration-200">
                        <div id="search-results" class="absolute top-full left-0 right-0 mt-2 bg-neutral-900 border border-white/10 rounded-xl overflow-hidden shadow-2xl hidden z-50 max-h-80 overflow-y-auto"></div>
                    </div>
                </div>

                <!-- Right Actions -->
                <div class="flex items-center gap-2">
                    <button onclick="toggleMobileSearch()" class="md:hidden p-2 rounded-lg hover:bg-white/5 transition-colors">
                        <i data-lucide="search" class="w-5 h-5 text-neutral-400"></i>
                    </button>
                    <a href="#home" class="nav-link hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-neutral-400 hover:text-white hover:bg-white/5 transition-all">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        <span>Home</span>
                    </a>
                    <button onclick="openAuth('login')" id="auth-btn" class="hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-neutral-400 hover:text-white hover:bg-white/5 transition-all">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        <span>Login</span>
                    </button>
                    <button onclick="openAuth('login')" id="auth-btn-mobile" class="sm:hidden p-2 rounded-lg hover:bg-white/5 transition-colors">
                        <i data-lucide="user" class="w-5 h-5 text-neutral-400"></i>
                    </button>
                    <!-- Logged in user menu -->
                    <div id="user-menu" class="hidden relative">
                        <button onclick="toggleUserMenu()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-white/5 transition-all">
                            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-xs font-bold" id="user-avatar">U</div>
                            <span class="text-sm font-medium hidden sm:block" id="user-name-nav">User</span>
                            <i data-lucide="chevron-down" class="w-3 h-3 text-neutral-500"></i>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 top-full mt-2 w-48 bg-neutral-900 border border-white/10 rounded-xl overflow-hidden shadow-2xl hidden z-50">
                            <a href="#profile" class="flex items-center gap-2 px-4 py-3 text-sm text-neutral-300 hover:bg-white/5 transition-colors">
                                <i data-lucide="user" class="w-4 h-4"></i> Profile
                            </a>
                            <a href="#orders" class="flex items-center gap-2 px-4 py-3 text-sm text-neutral-300 hover:bg-white/5 transition-colors">
                                <i data-lucide="package" class="w-4 h-4"></i> My Orders
                            </a>
                            <hr class="border-white/5">
                            <button onclick="logout()" class="flex items-center gap-2 px-4 py-3 text-sm text-red-400 hover:bg-white/5 transition-colors w-full text-left">
                                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                            </button>
                        </div>
                    </div>
                    <!-- Cart Button -->
                    <button onclick="navigate('cart')" class="relative p-2.5 rounded-lg hover:bg-white/5 transition-colors group">
                        <i data-lucide="shopping-bag" class="w-5 h-5 text-neutral-400 group-hover:text-brand-500 transition-colors"></i>
                        <span id="cart-badge" class="absolute -top-0.5 -right-0.5 w-5 h-5 bg-brand-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center hidden">0</span>
                    </button>
                </div>
            </div>
            <!-- Mobile Search -->
            <div id="mobile-search" class="hidden pb-3">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500"></i>
                    <input type="text" id="mobile-search-input" placeholder="Search restaurants or dishes..." 
                        class="w-full bg-neutral-900 border border-white/5 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-neutral-500">
                    <div id="mobile-search-results" class="absolute top-full left-0 right-0 mt-2 bg-neutral-900 border border-white/10 rounded-xl overflow-hidden shadow-2xl hidden z-50 max-h-64 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="pt-16 min-h-screen"></main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[90] hidden">
        <div class="overlay absolute inset-0" onclick="closeAuth()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="relative bg-neutral-900 border border-white/10 rounded-2xl w-full max-w-md animate-scale-in overflow-hidden">
                <button onclick="closeAuth()" class="absolute top-4 right-4 p-1.5 rounded-lg hover:bg-white/10 transition-colors z-10">
                    <i data-lucide="x" class="w-5 h-5 text-neutral-400"></i>
                </button>
                <div class="p-8">
                    <!-- Login Form -->
                    <div id="login-form">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center mb-6 shadow-lg shadow-brand-500/20">
                            <i data-lucide="log-in" class="w-7 h-7 text-white"></i>
                        </div>
                        <h2 class="text-2xl font-bold mb-1">Welcome back</h2>
                        <p class="text-neutral-500 text-sm mb-6">Sign in to your account to continue</p>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-medium text-neutral-400 mb-1.5">Email Address</label>
                                <input type="email" id="login-email" placeholder="you@example.com" 
                                    class="w-full bg-neutral-800 border border-white/5 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-neutral-400 mb-1.5">Password</label>
                                <input type="password" id="login-password" placeholder="••••••••" 
                                    class="w-full bg-neutral-800 border border-white/5 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600">
                            </div>
                            <div class="flex items-center justify-between">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" class="w-4 h-4 rounded border-white/10 bg-neutral-800 text-brand-500 focus:ring-brand-500/20">
                                    <span class="text-xs text-neutral-400">Remember me</span>
                                </label>
                                <button class="text-xs text-brand-500 hover:text-brand-400 transition-colors">Forgot password?</button>
                            </div>
                            <button onclick="handleLogin()" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white">
                                Sign In
                            </button>
                        </div>
                        <p class="text-center text-sm text-neutral-500 mt-6">
                            Don't have an account? 
                            <button onclick="switchAuth('register')" class="text-brand-500 hover:text-brand-400 font-medium transition-colors">Sign Up</button>
                        </p>
                    </div>
                    <!-- Register Form -->
                    <div id="register-form" class="hidden">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center mb-6 shadow-lg shadow-brand-500/20">
                            <i data-lucide="user-plus" class="w-7 h-7 text-white"></i>
                        </div>
                        <h2 class="text-2xl font-bold mb-1">Create account</h2>
                        <p class="text-neutral-500 text-sm mb-6">Join FoodDash and start ordering</p>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-medium text-neutral-400 mb-1.5">Full Name</label>
                                <input type="text" id="reg-name" placeholder="John Doe" 
                                    class="w-full bg-neutral-800 border border-white/5 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-neutral-400 mb-1.5">Email Address</label>
                                <input type="email" id="reg-email" placeholder="you@example.com" 
                                    class="w-full bg-neutral-800 border border-white/5 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-neutral-400 mb-1.5">Phone Number</label>
                                <input type="tel" id="reg-phone" placeholder="+1 234 567 8900" 
                                    class="w-full bg-neutral-800 border border-white/5 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-neutral-400 mb-1.5">Password</label>
                                <input type="password" id="reg-password" placeholder="Min 6 characters" 
                                    class="w-full bg-neutral-800 border border-white/5 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600">
                            </div>
                            <button onclick="handleRegister()" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white">
                                Create Account
                            </button>
                        </div>
                        <p class="text-center text-sm text-neutral-500 mt-6">
                            Already have an account? 
                            <button onclick="switchAuth('login')" class="text-brand-500 hover:text-brand-400 font-medium transition-colors">Sign In</button>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Success Modal -->
    <div id="success-modal" class="fixed inset-0 z-[90] hidden">
        <div class="overlay absolute inset-0" onclick="closeSuccessModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="relative bg-neutral-900 border border-white/10 rounded-2xl w-full max-w-sm animate-scale-in text-center overflow-hidden">
                <div class="p-8">
                    <div class="w-20 h-20 rounded-full bg-green-500/10 border-2 border-green-500/30 flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="check" class="w-10 h-10 text-green-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">Order Placed!</h2>
                    <p class="text-neutral-400 text-sm mb-2">Your order has been placed successfully</p>
                    <p class="text-xs text-neutral-500 mb-6">Order ID: <span id="order-id" class="text-brand-500 font-mono">#FD-000000</span></p>
                    <div class="bg-neutral-800 rounded-xl p-4 mb-6">
                        <div class="flex items-center gap-3 text-left">
                            <div class="w-10 h-10 rounded-full bg-brand-500/10 flex items-center justify-center flex-shrink-0">
                                <i data-lucide="clock" class="w-5 h-5 text-brand-500"></i>
                            </div>
                            <div>
                                <p class="text-sm font-medium">Estimated Delivery</p>
                                <p class="text-xs text-neutral-400" id="est-delivery">25-35 minutes</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="closeSuccessModal();navigate('home')" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white">
                        Back to Home
                    </button>
                </div>
            </div>
        </div>
    </div>

let state = {
    cart: [],

    orders: JSON.parse(localStorage.getItem('fd_orders')) || [],

    selectedCategory: 'all',

function saveState() {
    localStorage.setItem('fd_user', JSON.stringify(state.user));
    localStorage.setItem('fd_orders', JSON.stringify(state.orders));
}

// ==================== ROUTER ====================
function navigate(route, data) {
    state.currentRoute = route;
    if (data) state.selectedRestaurant = data;
    window.location.hash = route;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('hashchange', () => {
    const hash = window.location.hash.slice(1) || 'home';
    state.currentRoute = hash;
    render();
});

// ==================== CART FUNCTIONS ====================
function addToCart(itemId, restaurantId) {
    const restaurant = restaurants.find(r => r.id === restaurantId);
    const item = restaurant.items.find(i => i.id === itemId);
    if (!item) return;

    // Check if cart has items from different restaurant
    if (state.cart.length > 0 && state.cart[0].restaurantId !== restaurantId) {
        if (!confirm(`Your cart has items from ${restaurants.find(r=>r.id===state.cart[0].restaurantId).name}. Clear cart and add this item?`)) return;
        state.cart = [];
    }

    const existing = state.cart.find(c => c.itemId === itemId);
    if (existing) {
        existing.qty++;
    } else {
        state.cart.push({ itemId, restaurantId, qty: 1 });
    }
    updateCartBadge();
    showToast(`${item.name} added to cart`, 'success');
    render();
}

function updateQty(itemId, delta) {
    const item = state.cart.find(c => c.itemId === itemId);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
        state.cart = state.cart.filter(c => c.itemId !== itemId);
    }
    updateCartBadge();
    render();
}

function removeFromCart(itemId) {
    state.cart = state.cart.filter(c => c.itemId !== itemId);
    updateCartBadge();
    render();
}

function clearCart() {
    state.cart = [];
    updateCartBadge();
    render();
}

function getCartTotal() {
    let total = 0;
    state.cart.forEach(c => {
        const rest = restaurants.find(r => r.id === c.restaurantId);
        const item = rest.items.find(i => i.id === c.itemId);
        total += item.price * c.qty;
    });
    return total;
}

function getCartCount() {
    return state.cart.reduce((sum, c) => sum + c.qty, 0);
}

function getCartDeliveryFee() {
    if (state.cart.length === 0) return 0;
    const rest = restaurants.find(r => r.id === state.cart[0].restaurantId);
    return getCartTotal() >= 25 ? 0 : rest.deliveryFee;
}

function updateCartBadge() {
    const badge = document.getElementById('cart-badge');
    const count = getCartCount();
    if (count > 0) {
        badge.textContent = count;
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }
}

// ==================== AUTH ====================
function openAuth(mode) {
    document.getElementById('auth-modal').classList.remove('hidden');
    switchAuth(mode);
    document.body.style.overflow = 'hidden';
}

function closeAuth() {
    document.getElementById('auth-modal').classList.add('hidden');
    document.body.style.overflow = '';
}

function switchAuth(mode) {
    document.getElementById('login-form').classList.toggle('hidden', mode !== 'login');
    document.getElementById('register-form').classList.toggle('hidden', mode !== 'register');
}

function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }
    state.user = { name: email.split('@')[0], email, phone: '+1 234 567 8900' };
    saveState();
    closeAuth();
    updateAuthUI();
    showToast('Welcome back! 🎉', 'success');
}

function handleRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !phone || !password) { showToast('Please fill in all fields', 'error'); return; }
    if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
    state.user = { name, email, phone };
    saveState();
    closeAuth();
    updateAuthUI();
    showToast('Account created! Welcome to FoodDash 🎉', 'success');
}

function logout() {
    state.user = null;
    saveState();
    updateAuthUI();
    closeUserMenu();
    showToast('Logged out successfully', 'info');
    navigate('home');
}

function updateAuthUI() {
    const authBtn = document.getElementById('auth-btn');
    const authBtnMobile = document.getElementById('auth-btn-mobile');
    const userMenu = document.getElementById('user-menu');
    if (state.user) {
        authBtn.classList.add('hidden');
        authBtnMobile.classList.add('hidden');
        userMenu.classList.remove('hidden');
        document.getElementById('user-avatar').textContent = state.user.name[0].toUpperCase();
        document.getElementById('user-name-nav').textContent = state.user.name;
    } else {
        authBtn.classList.remove('hidden');
        authBtnMobile.classList.remove('hidden');
        userMenu.classList.add('hidden');
    }
}

function closeUserMenu() {

// ==================== SEARCH ====================
function setupSearch() {
    const input = document.getElementById('search-input');
    const results = document.getElementById('search-results');
    const mobileInput = document.getElementById('mobile-search-input');
    const mobileResults = document.getElementById('mobile-search-results');

    function doSearch(query, container) {
        if (!query.trim()) { container.classList.add('hidden'); return; }
        const q = query.toLowerCase();
        let html = '';
        // Search restaurants
        restaurants.forEach(r => {
            if (r.name.toLowerCase().includes(q) || r.tags.some(t => t.toLowerCase().includes(q))) {
                html += `<a href="#restaurant-${r.id}" onclick="navigate('restaurant',${r.id})" class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 transition-colors">
                    <img src="${r.logo}" class="w-10 h-10 rounded-lg object-cover">
                    <div><p class="text-sm font-medium">${r.name}</p><p class="text-xs text-neutral-500">${r.tags.join(' · ')}</p></div>
                </a>`;
            }
        });
        // Search items
        restaurants.forEach(r => {
            r.items.forEach(item => {
                if (item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q)) {
                    html += `<a href="#restaurant-${r.id}" onclick="navigate('restaurant',${r.id})" class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 transition-colors border-t border-white/5">
                        <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover">
                        <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">${item.name}</p><p class="text-xs text-neutral-500">${r.name} · $${item.price}</p></div>
                    </a>`;
                }
            });
        });
        if (!html) html = '<div class="px-4 py-6 text-center text-sm text-neutral-500">No results found</div>';
        container.innerHTML = html;
        container.classList.remove('hidden');
    }

    input.addEventListener('input', (e) => doSearch(e.target.value, results));
    input.addEventListener('blur', () => setTimeout(() => results.classList.add('hidden'), 200));
    mobileInput.addEventListener('input', (e) => doSearch(e.target.value, mobileResults));
    mobileInput.addEventListener('blur', () => setTimeout(() => mobileResults.classList.add('hidden'), 200));
}

function toggleMobileSearch() {
    const el = document.getElementById('mobile-search');
    el.classList.toggle('hidden');
    if (!el.classList.contains('hidden')) document.getElementById('mobile-search-input').focus();
}

// ==================== TOAST ====================
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const colors = { success:'border-green-500/30 bg-green-500/10', error:'border-red-500/30 bg-red-500/10', info:'border-brand-500/30 bg-brand-500/10' };
    const icons = { success:'check-circle', error:'alert-circle', info:'info' };
    const iconColors = { success:'text-green-500', error:'text-red-500', info:'text-brand-500' };
    const toast = document.createElement('div');
    toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl border ${colors[type]} backdrop-blur-lg shadow-2xl max-w-sm`;
    toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 ${iconColors[type]} flex-shrink-0"></i><p class="text-sm text-white">${message}</p>`;
    container.appendChild(toast);
    lucide.createIcons({ nodes: [toast] });
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)'; toast.style.transition = 'all .3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ==================== ORDER ====================
function placeOrder() {
    if (!state.user) { openAuth('login'); return; }
    if (state.cart.length === 0) return;

    const orderId = 'FD-' + String(Math.floor(Math.random() * 999999)).padStart(6, '0');
    const rest = restaurants.find(r => r.id === state.cart[0].restaurantId);
    const items = state.cart.map(c => {
        const item = rest.items.find(i => i.id === c.itemId);
        return { ...item, qty: c.qty };
    });

    state.orders.unshift({
        id: orderId,
        restaurant: rest.name,
        restaurantId: rest.id,
        items,
        total: getCartTotal() + getCartDeliveryFee(),
        deliveryFee: getCartDeliveryFee(),
        date: new Date().toISOString(),
        status: 'Preparing',
        deliveryTime: rest.deliveryTime
    });

    document.getElementById('order-id').textContent = '#' + orderId;
    document.getElementById('est-delivery').textContent = rest.deliveryTime + ' minutes';
    document.getElementById('success-modal').classList.remove('hidden');

    state.cart = [];
    updateCartBadge();
    saveState();
}

function closeSuccessModal() {
    document.getElementById('success-modal').classList.add('hidden');
}

function render() {
    const app = document.getElementById('app');
    switch (state.currentRoute) {
        case 'home': app.innerHTML = renderHome(); break;
        case 'restaurant': app.innerHTML = renderRestaurant(); break;
        case 'cart': app.innerHTML = renderCart(); break;
        case 'checkout': app.innerHTML = renderCheckout(); break;
        case 'profile': app.innerHTML = renderProfile(); break;
        case 'orders': app.innerHTML = renderOrders(); break;
        default: app.innerHTML = renderHome();
    }
    lucide.createIcons();
    updateAuthUI();
}

    const inCart = state.cart.find(c => c.itemId === item.id);
    return `

                                    <button onclick="updateQty(${item.id},1)" class="qty-btn w-8 h-8 rounded-lg border border-white/10 flex items-center justify-center text-sm font-bold">+</button>

// ==================== INIT ====================
function init() {
    setupSearch();
    updateCartBadge();
    updateAuthUI();
    const hash = window.location.hash.slice(1) || 'home';
    if (hash.startsWith('restaurant-')) {
        state.currentRoute = 'restaurant';
        state.selectedRestaurant = parseInt(hash.split('-')[1]);
    } else {
        state.currentRoute = hash;
    }
    render();
}

// Handle restaurant hash links
const origNavigate = navigate;
navigate = function(route, data) {
    if (route === 'restaurant' && data) {
        window.location.hash = 'restaurant-' + data;
    } else {
        window.location.hash = route;
    }
};

document.addEventListener('DOMContentLoaded', init);
</script>
